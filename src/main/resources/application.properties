spring.application.name=creatorflow
spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/creatorflow


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
application.security.jwt.expiration-ms=86400000


spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/youtube.upload,https://www.googleapis.com/auth/youtube.readonly
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5173/youtube/callback